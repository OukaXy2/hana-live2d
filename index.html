<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hana — Asisten Virtualku</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #f7a8c4;
    --lilac: #d4b8e0;
    --text: #3a3240;
    --text-soft: #8a7d99;
    --bg: #f7f5f2;
    --surface: #ffffff;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(247,168,196,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(212,184,224,0.12) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── CANVAS ── */
  #live2d-canvas {
    position: fixed;
    z-index: 20;
    cursor: grab;
    touch-action: none;
  }
  #live2d-canvas:active { cursor: grabbing; }

  /* ── SPEECH BUBBLE ── */
  #speech-bubble {
    position: fixed;
    z-index: 21;
    background: white;
    border: 2px solid var(--pink);
    border-radius: 16px;
    padding: 9px 13px;
    font-size: 13px;
    color: var(--text);
    max-width: 180px;
    line-height: 1.45;
    box-shadow: 0 4px 18px rgba(247,168,196,0.25);
    pointer-events: none;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.22s, transform 0.22s cubic-bezier(0.175,0.885,0.32,1.275);
    word-break: break-word;
  }
  #speech-bubble.visible { opacity: 1; transform: scale(1); }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 20px;
    border: 5px solid transparent;
    border-top-color: var(--pink);
  }
  #speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -7px; left: 21px;
    border: 4px solid transparent;
    border-top-color: white;
    z-index: 1;
  }

  /* ── NAME TAG ── */
  #name-tag {
    position: fixed;
    z-index: 22;
    background: linear-gradient(135deg, var(--pink), var(--lilac));
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 99px;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(247,168,196,0.4);
  }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    gap: 16px;
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid #f0eaf5;
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p {
    color: var(--text-soft);
    font-size: 14px;
    font-weight: 600;
  }

  /* ── CHAT PANEL ── */
  #chat-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: var(--surface);
    border-radius: 28px 28px 0 0;
    box-shadow: 0 -4px 32px rgba(180,140,200,0.15);
    display: flex;
    flex-direction: column;
    z-index: 10;
    overflow: hidden;
  }
  #chat-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0 4px;
    flex-shrink: 0;
  }
  #chat-handle::before {
    content: '';
    width: 36px; height: 4px;
    background: #ddd;
    border-radius: 99px;
  }
  #chat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 20px 10px;
    flex-shrink: 0;
  }
  #chat-header .dot {
    width: 8px; height: 8px;
    background: #7ddb9a;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  #chat-header span { font-size: 13px; color: var(--text-soft); font-weight: 600; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: #e0d0ec; border-radius: 99px; }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    animation: pop-in 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.85) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .bubble.user {
    align-self: flex-end;
    background: #ede9f7;
    color: var(--text);
    border-bottom-right-radius: 5px;
  }
  .bubble.ai {
    align-self: flex-start;
    background: white;
    color: var(--text);
    border-bottom-left-radius: 5px;
    box-shadow: 0 2px 12px rgba(180,140,200,0.12);
  }
  .bubble.typing span {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--pink);
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
  .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-7px); }
  }

  #input-area {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px 18px;
    flex-shrink: 0;
    border-top: 1px solid #f0eaf5;
  }
  #msg-input {
    flex: 1;
    border: none;
    background: #f5f1fa;
    border-radius: 99px;
    padding: 11px 18px;
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: box-shadow 0.2s;
  }
  #msg-input:focus { box-shadow: 0 0 0 2.5px var(--pink); }
  #msg-input::placeholder { color: #c0b0cc; }

  #send-btn {
    width: 42px; height: 42px;
    border: none;
    background: linear-gradient(135deg, var(--pink), var(--lilac));
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px rgba(247,168,196,0.45);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* error banner */
  #error-banner {
    display: none;
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: #fff0f3;
    border: 1px solid #ffb3c6;
    color: #c0395a;
    padding: 8px 18px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    z-index: 99;
    text-align: center;
    max-width: 90%;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Memuat Hana... 🌸</p>
</div>

<div id="error-banner"></div>
<div id="name-tag">✦ Hana</div>
<div id="speech-bubble"></div>
<canvas id="live2d-canvas"></canvas>

<div id="chat-panel">
  <div id="chat-handle"></div>
  <div id="chat-header">
    <div class="dot"></div>
    <span>Hana sedang online</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Tulis pesan ke Hana..." maxlength="300" autocomplete="off"/>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2 12L22 2 12 22 10 14 2 12Z"/></svg>
    </button>
  </div>
</div>

<!-- Live2D Cubism Core -->
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<!-- PIXI v5 (required by pixi-live2d-display@0.4) -->
<script src="https://cdn.jsdelivr.net/npm/pixi.js@5.3.12/dist/pixi.min.js"></script>
<!-- pixi-live2d-display -->
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
// ── CONFIG ──
const MODEL_URL = 'https://oukaxy2.github.io/hana-live2d/%E5%A5%B3%E4%BB%86.model3.json';

// ── ELEMENTS ──
const canvas      = document.getElementById('live2d-canvas');
const bubble      = document.getElementById('speech-bubble');
const nameTag     = document.getElementById('name-tag');
const messagesEl  = document.getElementById('messages');
const input       = document.getElementById('msg-input');
const sendBtn     = document.getElementById('send-btn');
const loadingEl   = document.getElementById('loading');
const errorBanner = document.getElementById('error-banner');

// ── PIXI APP ──
const CHAR_W = 280;
const CHAR_H = 380;

const app = new PIXI.Application({
  view: canvas,
  width: CHAR_W,
  height: CHAR_H,
  transparent: true,
  backgroundAlpha: 0,
  antialias: true,
  autoDensity: true,
  resolution: window.devicePixelRatio || 1,
});

canvas.style.width  = CHAR_W + 'px';
canvas.style.height = CHAR_H + 'px';

// ── POSITION ──
let charX = window.innerWidth / 2 - CHAR_W / 2;
let charY = window.innerHeight * 0.05;

function setPos(x, y) {
  charX = Math.max(-40, Math.min(window.innerWidth - CHAR_W + 40, x));
  charY = Math.max(-20, Math.min(window.innerHeight - CHAR_H - 10, y));
  canvas.style.left = charX + 'px';
  canvas.style.top  = charY + 'px';
  nameTag.style.left = (charX + CHAR_W / 2 - 30) + 'px';
  nameTag.style.top  = (charY + CHAR_H - 10) + 'px';
  updateBubble();
}

function updateBubble() {
  let bx = charX + CHAR_W + 8;
  let by = charY + 30;
  if (bx + 190 > window.innerWidth) bx = charX - 195;
  bubble.style.left = bx + 'px';
  bubble.style.top  = by + 'px';
}

setPos(charX, charY);

// ── DRAG ──
let dragging = false, ox = 0, oy = 0;

function startDrag(cx, cy) {
  dragging = true;
  ox = cx - charX; oy = cy - charY;
}
function moveDrag(cx, cy) {
  if (!dragging) return;
  setPos(cx - ox, cy - oy);
}
function endDrag() { dragging = false; }

canvas.addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
document.addEventListener('mouseup',   endDrag);
canvas.addEventListener('touchstart',  e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
document.addEventListener('touchmove', e => { if(!dragging) return; e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
document.addEventListener('touchend',  endDrag);

// ── SPEECH BUBBLE ──
let bubbleTimer = null;
function showBubble(text, duration = 3500) {
  bubble.textContent = text;
  updateBubble();
  bubble.classList.add('visible');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), duration);
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = 'block';
  setTimeout(() => errorBanner.style.display = 'none', 4000);
}

// ── CHAT ──
function addBubble(text, role) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}
function addTyping() {
  const div = document.createElement('div');
  div.className = 'bubble ai typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

// ── CLAUDE API ──
const SYSTEM = `Kamu adalah Hana, asisten virtual anime yang kalem, perhatian, dan sedikit kuudere.
Kamu berbicara dalam Bahasa Indonesia dengan gaya santai tapi tetap elegan.
Jawaban singkat (maks 3 kalimat), sesekali pakai emoji tapi tidak berlebihan.
Kamu perhatian tapi tidak terlalu ekspresif — kadang blunt tapi tulus.`;

const history = [];

async function sendMessage(text) {
  if (!text.trim()) return;
  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  addBubble(text, 'user');
  history.push({ role: 'user', content: text });

  showBubble('...', 99999);
  const typing = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '...';

    typing.remove();
    addBubble(reply, 'ai');
    history.push({ role: 'assistant', content: reply });

    showBubble(reply.length > 60 ? reply.slice(0, 58) + '…' : reply, 4000);

    // trigger motion
    if (model) {
      try { model.motion('tap_body'); } catch(e) {}
    }

  } catch(err) {
    typing.remove();
    const msg = 'Koneksi bermasalah... 😢';
    addBubble(msg, 'ai');
    showBubble(msg, 3000);
  }

  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', () => sendMessage(input.value));
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(input.value); });

// ── LOAD LIVE2D MODEL ──
let model = null;

async function loadModel() {
  try {
    // cubism4.min.js exposes Live2DModel via PIXI.live2d
    const Live2DModel = PIXI?.live2d?.Live2DModel;
    if (!Live2DModel) throw new Error('Live2DModel tidak ditemukan! Library gagal load.');
    
    model = await Live2DModel.from(MODEL_URL, {
      onError(e) { console.warn('Live2D load warning:', e); }
    });

    app.stage.addChild(model);

    // Scale & center model in canvas
    const scaleX = CHAR_W / model.width;
    const scaleY = CHAR_H / model.height;
    const scale  = Math.min(scaleX, scaleY) * 0.95;
    model.scale.set(scale);
    model.x = (CHAR_W  - model.width)  / 2;
    model.y = (CHAR_H - model.height) / 2;

    // Enable auto interaction
    model.interactive = false;

    // idle motion
    try { model.motion('idle'); } catch(e) {}

    loadingEl.style.display = 'none';

    // Greet
    setTimeout(() => {
      const greet = 'Kamu akhirnya datang. Aku sudah menunggu. 🌸';
      addBubble(greet, 'ai');
      history.push({ role: 'assistant', content: greet });
      showBubble(greet, 5000);
    }, 500);

    // tap character
    canvas.addEventListener('click', () => {
      if (dragging) return;
      const reactions = [
        '...ada apa?',
        'Jangan ganggu aku. ...tapi boleh sih. 💙',
        'Kamu lagi butuh sesuatu?',
        'Aku di sini kok. 🌸',
      ];
      const r = reactions[Math.floor(Math.random() * reactions.length)];
      showBubble(r, 3000);
      try { model.motion('tap_body'); } catch(e) {}
    });

  } catch(err) {
    console.error('Gagal load model:', err);
    loadingEl.style.display = 'none';
    showError('Gagal load model Live2D — cek konsol untuk detail');
    // fallback SVG
    loadFallback();
  }
}

function loadFallback() {
  canvas.style.display = 'none';
  const div = document.createElement('div');
  div.style.cssText = `position:fixed;z-index:20;left:${charX}px;top:${charY}px;font-size:80px;cursor:grab;`;
  div.textContent = '🧍';
  document.body.appendChild(div);
}

// ── INIT ──
// Wait for all scripts then init
window.addEventListener('load', () => {
  setTimeout(loadModel, 300);
});
</script>
</body>
</html>
